<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrganizaT</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
:root{
--azul:#0b2a5b;
--amarillo:#f2c94c;
--amarilloSuave:#fff4cc;
--fondo:#f4f6fb;
}
body{font-family:Arial;margin:0;padding:20px;background:var(--fondo);color:#222;transition:.3s}
header{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:15px}
h1{margin:0;color:var(--azul)}
button{padding:6px 10px;border:none;border-radius:5px;background:var(--azul);color:white;cursor:pointer}
button:hover{opacity:.85}
input,select{padding:6px;border-radius:5px;border:1px solid #ccc}
#tutorial-box{max-width:900px;margin:10px auto 20px auto;background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.hidden{display:none}
#progress-container{max-width:600px;margin:10px auto;background:#ddd;border-radius:20px;overflow:hidden}
#progress-bar{height:20px;width:0;background:var(--amarillo);text-align:center;font-size:12px;font-weight:bold}
#task-form,#search-sort{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:15px}
#board{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.column{background:white;padding:15px;border-radius:10px;width:280px;min-height:250px;box-shadow:0 2px 6px rgba(0,0,0,.2);border-top:6px solid var(--amarillo)}
.column h3{text-align:center;margin-bottom:3px;color:var(--azul)}
.counter{text-align:center;font-size:13px;margin-bottom:10px;color:#555}
.task-item{background:var(--amarilloSuave);padding:8px;margin-bottom:8px;border-left:6px solid var(--azul);border-radius:5px;display:flex;justify-content:space-between;align-items:center;cursor:grab}
.priority-high{border-color:#e74c3c}
.priority-medium{border-color:#f1c40f}
.priority-low{border-color:#2ecc71}
.dark{background:#0b1a33;color:white}
.dark h1{color:var(--amarillo)}
.dark .column{background:#162447}
.dark .column h3{color:var(--amarillo)}
.dark .task-item{background:#1f2f57}
.dark button{background:var(--amarillo);color:#000}
.dark #tutorial-box{background:#162447;color:white}
</style>
</head>
<body>
<header>
<h1>OrganizaT</h1>
</header>

<button onclick="toggleTutorial()">Mostrar / Ocultar tutorial</button>

<div id="tutorial-box" class="hidden">
<b>Mini tutorial:</b>
<p>1. Agrega tareas con título y fecha.</p>
<p>2. Arrastra tareas entre columnas.</p>
<p>3. Usa búsqueda y ordenamiento.</p>
<p>4. Observa la barra de progreso.</p>
<p>5. Cuando todas estén completadas recibirás una felicitación.</p>
</div>

<div id="progress-container">
<div id="progress-bar">0%</div>
</div>

<div id="task-form">
<input id="task-title" placeholder="Título">
<input type="date" id="task-date">
<select id="task-priority">
<option value="high">Alta</option>
<option value="medium">Media</option>
<option value="low">Baja</option>
</select>
<input id="task-desc" placeholder="Descripción">
<button onclick="addTask()">Agregar</button>
</div>

<div id="search-sort">
<input id="search" placeholder="Buscar" oninput="renderTasks()">
<select id="sort" onchange="renderTasks()">
<option value="date">Fecha</option>
<option value="priority">Prioridad</option>
<option value="title">Nombre</option>
</select>
<button onclick="toggleTheme()">Modo oscuro / claro</button>
</div>

<div id="board">
<div class="column">
<h3>Pendientes</h3>
<div class="counter" id="count-pending"></div>
<div id="pending"></div>
</div>

<div class="column">
<h3>En progreso</h3>
<div class="counter" id="count-progress"></div>
<div id="progress"></div>
</div>

<div class="column">
<h3>Completadas</h3>
<div class="counter" id="count-done"></div>
<div id="done"></div>
</div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || []

function save(){localStorage.setItem("tasks",JSON.stringify(tasks))}

function toggleTheme(){document.body.classList.toggle("dark")}

function toggleTutorial(){document.getElementById("tutorial-box").classList.toggle("hidden")}

function addTask(){
const title=document.getElementById("task-title").value
const date=document.getElementById("task-date").value
const priority=document.getElementById("task-priority").value
const desc=document.getElementById("task-desc").value

if(!title||!date){alert("Pon título y fecha");return}

tasks.push({title,date,priority,desc,status:"pending"})

save()
renderTasks()
}

function deleteTask(i){tasks.splice(i,1);save();renderTasks()}

function updateProgress(){
const total=tasks.length
const done=tasks.filter(t=>t.status==="done").length
const percent=total?Math.round(done/total*100):0
const bar=document.getElementById("progress-bar")
bar.style.width=percent+"%"
bar.textContent=percent+"%"
}

function showCongrats(){
const box=document.createElement("div")
box.innerHTML="🎉 ¡Felicidades! Terminaste todas tus tareas"
box.style.position="fixed"
box.style.top="20px"
box.style.left="50%"
box.style.transform="translateX(-50%)"
box.style.background="#f2c94c"
box.style.padding="15px 25px"
box.style.borderRadius="10px"
box.style.fontWeight="bold"
box.style.zIndex="999"

document.body.appendChild(box)

setTimeout(()=>box.remove(),4000)
}

function checkAllCompleted(){
if(tasks.length===0)return
if(tasks.every(t=>t.status==="done"))showCongrats()
}

function renderTasks(){
const pending=document.getElementById("pending")
const progress=document.getElementById("progress")
const done=document.getElementById("done")

pending.innerHTML=""
progress.innerHTML=""
done.innerHTML=""

let cPending=0,cProgress=0,cDone=0

const search=document.getElementById("search").value.toLowerCase()
let arr=[...tasks]

if(search){arr=arr.filter(t=>t.title.toLowerCase().includes(search)||t.desc.toLowerCase().includes(search))}

arr.forEach((task,i)=>{
const div=document.createElement("div")

div.className="task-item priority-"+task.priority

div.dataset.index=i


div.innerHTML=`<span><b>${task.title}</b><br>${task.date}<br>${task.desc}</span><button onclick="deleteTask(${i})">X</button>`

if(task.status==="pending"){pending.appendChild(div);cPending++}
else if(task.status==="inprogress"){progress.appendChild(div);cProgress++}
else{done.appendChild(div);cDone++}
})

document.getElementById("count-pending").textContent=cPending+" tareas"
document.getElementById("count-progress").textContent=cProgress+" tareas"
document.getElementById("count-done").textContent=cDone+" tareas"

updateProgress()
checkAllCompleted()
}

function initDrag(){

new Sortable(document.getElementById("pending"),{
 group:"tasks",
 animation:150,
 onEnd:(evt)=>{tasks[evt.item.dataset.index].status="pending";save();renderTasks()}
})

new Sortable(document.getElementById("progress"),{
 group:"tasks",
 animation:150,
 onEnd:(evt)=>{tasks[evt.item.dataset.index].status="inprogress";save();renderTasks()}
})

new Sortable(document.getElementById("done"),{
 group:"tasks",
 animation:150,
 onEnd:(evt)=>{tasks[evt.item.dataset.index].status="done";save();renderTasks()}
})

}

window.onload=()=>{
renderTasks()
initDrag()
}

</script>
</body>
</html>
