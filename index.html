<!DOCTYPE html>
<html lang="es">
<head>    
<meta charset="UTF-8">    
<title>Entrenamiento Jedi Pro</title>
<style>    
body {    
  margin: 0;    
  background: black;    
  color: #ffe81f;    
  text-align: center;    
  overflow: hidden;    
  font-family: 'Arial Black', sans-serif;    
}    
h2 {
  font-size: 40px;
  letter-spacing: 3px;
  text-shadow:
    0 0 10px #ffe81f,
    0 0 20px #ffe81f,
    0 0 40px #ffcc00;
}

button {
  font-family: 'Arial Black', sans-serif;
  background: black;
  color: #ffe81f;
  border: 2px solid #ffe81f;
  padding: 10px 20px;
  margin-top: 10px;
  cursor: pointer;
  text-shadow: 0 0 10px #ffe81f;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

#game-area {
  position: relative;
  width: 320px;
  height: 500px;
  margin: auto;
  margin-top: 20px;
}

#enemy {
  position: absolute;
  top: 10px;
  left: 120px;
  width: 80px;
  height: 70px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 15px white;
}

#enemy::before {
  content: "";
  position: absolute;
  top: 25px;
  left: 10px;
  width: 60px;
  height: 12px;
  background: black;
  border-radius: 10px;
}

#enemy::after {
  content: "";
  position: absolute;
  top: 45px;
  left: 20px;
  width: 40px;
  height: 10px;
  background: black;
  border-radius: 10px;
}

#enemy span {
  position: absolute;
  top: 28px;
  width: 10px;
  height: 10px;
  background: black;
  border-radius: 50%;
}

#eye1 { left: 18px; }
#eye2 { right: 18px; }

.laser {
  position: absolute;
  width: 6px;
  height: 30px;
  background: red;
  box-shadow: 0 0 15px red, 0 0 30px red;
}

#player {
  position: absolute;
  bottom: 30px;
  width: 120px;
  height: 12px;
  left: 100px;
  display: flex;
}

#handle {
  width: 25px;
  background: linear-gradient(#666, #222);
  border: 1px solid #aaa;
}

#blade {
  flex: 1;
  background: linear-gradient(to right, #aef, #0ff);
  box-shadow:
    0 0 10px #0ff,
    0 0 20px #0ff,
    0 0 40px #0ff,
    0 0 80px #0ff;
  border-radius: 4px;
}

#life-bar {
  width: 220px;
  height: 18px;
  border: 2px solid cyan;
  margin: auto;
  box-shadow: 0 0 10px cyan;
}

#life {
  height: 100%;
  width: 100%;
  background: linear-gradient(to right, cyan, blue);
}

#yoda {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #90ff90;
  font-size: 24px;
  text-shadow: 0 0 10px lime;
  max-width: 250px;
}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<h2>Entrenamiento Jedi</h2>
<div id="game-area">    
  <div id="enemy">    
    <span id="eye1"></span>    
    <span id="eye2"></span>    
  </div>    
  <div id="player">    
    <div id="handle"></div>    
    <div id="blade"></div>    
  </div>    
</div>
<div id="life-bar"><div id="life"></div></div>
<p>Puntos: <span id="score">0</span></p>
<p>Récord: <span id="record">0</span></p>
<button onclick="startGame()">Iniciar</button>
<div id="yoda">“Concéntrate debes…”</div>

<script>
// ⭐ ESTRELLAS    
const canvas = document.getElementById("stars");    
const ctx = canvas.getContext("2d");    
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for (let i = 0; i < 500; i++) {
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    speed: Math.random()*0.7 + 0.2,
    size: Math.random()*2
  });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    ctx.fillStyle="white";
    ctx.fillRect(s.x,s.y,s.size,s.size);
    s.y+=s.speed;
    if(s.y>canvas.height) s.y=0;
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// 🎮 VARIABLES
let player = document.getElementById("player");
let blade = document.getElementById("blade");
let scoreEl = document.getElementById("score");
let recordEl = document.getElementById("record");
let lifeEl = document.getElementById("life");
let yoda = document.getElementById("yoda");

let lasers=[];
let score=0;
let lives=100;
let speed=2;
let spawnRate=1800;
let running=false;

// 🔊 SONIDOS
let shootSound = new Audio("https://www.soundjay.com/mechanical/sounds/laser-01.mp3");
let blockSound = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");
let clashSound = new Audio("https://www.soundjay.com/mechanical/sounds/metal-clang-01.mp3");

// 🎵 MUSICA
let bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.3;

// 🧙‍♂️ VOZ
function speakYoda(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "es-ES";
  msg.pitch = 0.3;
  msg.rate = 0.7;
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

let lastPhrase = "";

// 🧠 YODA INTELIGENTE
let yodaActivo = true;

function yodaEvento(tipo){
  if(!yodaActivo) return;
  let frases = {
    inicio: ["Comienza tu entrenamiento, joven padawan","Listo estás, empieza debes"],
    daño: ["Cuidado debes tener","El dolor sentirás","Concéntrate más debes"],
    record: ["Superado tu límite has","Orgulloso estoy de ti"],
    muerte: ["Derrotado has sido","Mucho que aprender aún tienes","El final no es, volver puedes"]
  };
  let lista = frases[tipo];
  if(!lista) return;
  let frase;
  do {
    frase = lista[Math.floor(Math.random()*lista.length)];
  } while(frase === lastPhrase);
  lastPhrase = frase;
  yoda.textContent = frase;
  speakYoda(frase);
}

// 🎬 GAME OVER
let gameOverShown = false;
function gameOverAnim(){
  if(gameOverShown) return;
  gameOverShown = true;
  let over = document.createElement("div");
  over.style.position = "fixed";
  over.style.top = "50%";
  over.style.left = "50%";
  over.style.transform = "translate(-50%, -50%) scale(0)";
  over.style.color = "red";
  over.style.fontSize = "60px";
  over.style.textShadow = "0 0 20px red, 0 0 40px darkred";
  over.style.transition = "all 0.5s ease";
  over.textContent = "GAME OVER";
  document.body.appendChild(over);
  setTimeout(()=>{ over.style.transform = "translate(-50%, -50%) scale(1)"; },50);
}

// ✨ EFECTO VISUAL
function effect(x,y){
  let e = document.createElement("div");
  e.style.position="absolute";
  e.style.left=x+"px";
  e.style.top=y+"px";
  e.style.width="10px";
  e.style.height="10px";
  e.style.background="cyan";
  e.style.boxShadow="0 0 20px cyan";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),200);
}

// ⚔️ CAMBIO DE SABLE
function updateBlade(){
  let colors=["#0ff","#0f0","#f00","#ff0","#f0f"];
  let c=colors[Math.floor(Math.random()*colors.length)];
  blade.style.background=c;
  blade.style.boxShadow=`0 0 20px ${c},0 0 40px ${c}`;
}

// 🌟 CREAR LÁSER CORRECTAMENTE
function createLaser(){
  let el = document.createElement("div");
  el.className = "laser";
  let gameWidth = document.getElementById("game-area").offsetWidth;
  let x = Math.random() * (gameWidth - 10);
  el.style.left = x + "px";
  el.style.top = "0px";
  el.style.position = "absolute";
  el.style.display = "block";
  document.getElementById("game-area").appendChild(el);
  lasers.push({el: el, x: x, y: 0});
  shootSound.currentTime = 0;
  shootSound.play();
}

// LOOP
function update(time){
  if(!running) return;
  lasers.forEach((l,i)=>{
    l.y+=speed;
    l.el.style.top=l.y+"px";
    let p=player.getBoundingClientRect();
    let r=l.el.getBoundingClientRect();
    if(l.y>420 && r.left<p.right && r.right>p.left){
      score++;
      scoreEl.textContent=score;
      effect(l.x,420);
      clashSound.currentTime=0;
      clashSound.play();
      blockSound.currentTime=0;
      blockSound.play();
      updateBlade();

      // Animación simple de rebote
      let bounceY = l.y;
      let bounceStep = 5;
      let bounceCount = 0;
      let bounceInterval = setInterval(()=>{
        l.y -= bounceStep;
        l.el.style.top = l.y + "px";
        bounceCount++;
        if(bounceCount >= 5){
          clearInterval(bounceInterval);
          l.el.remove();
        }
      }, 20);

      let record=localStorage.getItem("record")||0;
      if(score>record){
        localStorage.setItem("record",score);
        yodaEvento("record");
      }
      lasers.splice(i,1);
    } else if(l.y>500){
      lives-=10;
      lifeEl.style.width=lives+"%";
      yodaEvento("daño");
      l.el.remove();
      lasers.splice(i,1);
      if(lives<=0){
        running=false;
        bgMusic.pause();
        yodaEvento("muerte");
        yodaActivo=false;
        gameOverAnim();
      }
    }
  });
  if(time%7000<20){
    speed+=0.2;
    spawnRate*=0.92;
  }
  requestAnimationFrame(update);
}

// SPAWN
function spawn(){
  if(!running) return;
  createLaser();
  setTimeout(spawn,spawnRate);
}

// START
function startGame(){
  score=0;
  lives=100;
  speed=2;
  spawnRate=1800;
  running=true;
  gameOverShown = false;
  scoreEl.textContent=0;
  lifeEl.style.width="100%";
  recordEl.textContent=localStorage.getItem("record")||0;
  lasers.forEach(l=>l.el.remove());
  lasers=[];
  bgMusic.currentTime=0;
  bgMusic.play();
  yodaActivo=true;
  yodaEvento("inicio");
  spawn();
  requestAnimationFrame(update);
}

// MOVIMIENTO PC Y MÓVIL
function movePlayer(x) {
  let rect = document.getElementById("game-area").getBoundingClientRect();
  player.style.left = (x - 60) + "px";
}

if ('ontouchstart' in window) {
  document.addEventListener("touchmove", e => {
    if(!running) return;
    movePlayer(e.touches[0].clientX);
    e.preventDefault();
  }, {passive:false});
} else {
  document.addEventListener("mousemove", e => {
    if(!running) return;
    movePlayer(e.clientX);
  });
}
</script>
</body>
</html>
